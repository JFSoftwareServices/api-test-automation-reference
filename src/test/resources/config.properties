# ─── Base configuration ────────────────────────────────────────────────────────
# Values here are defaults. Any key can be overridden at runtime by:
#   1. JVM system property: -Dbase.url.json=https://my-api.com
#   2. Environment variable: BASE_URL_JSON=https://my-api.com
#   3. Maven profile: mvn test -Pstaging
#   4. Docker env file: --env-file envs/staging.env
#
# The active environment is loaded by ConfigManager in priority order:
#   system property > environment variable > this file

base.url.json=https://jsonplaceholder.typicode.com
base.url.xml=https://jsonplaceholder.typicode.com

# Timeouts in milliseconds
connection.timeout=5000
read.timeout=10000

# Logging (true/false) — set to false in prod to reduce noise
log.requests=true
log.responses=true

# Default environment tag (overridden by -Denv=qa etc.)
env=local 